<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="WeatherDaddy splash screen">
  <!-- A single 1000x1000 splash template. The per-device PNGs are rendered
       at the device's exact pixel dimensions; this SVG is letterboxed into
       each target by the rasterizer with the background colour filling the
       padding, so the artwork stays centered. -->
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb24d"/>
      <stop offset="0.55" stop-color="#ff8a1f"/>
      <stop offset="1" stop-color="#ff6d00"/>
    </radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcdcdc"/>
    </linearGradient>
  </defs>

  <!-- Solid dark fill matching the app background -->
  <rect width="1000" height="1000" fill="#121212"/>

  <!-- Logo, centered at ~50% Y, ~280px square equivalent -->
  <g transform="translate(322,300) scale(0.7)">
    <g stroke="url(#sun)" stroke-width="22" stroke-linecap="round" opacity="0.95">
      <line x1="200" y1="70"  x2="200" y2="120"/>
      <line x1="200" y1="320" x2="200" y2="370"/>
      <line x1="50"  y1="220" x2="100" y2="220"/>
      <line x1="300" y1="220" x2="350" y2="220"/>
      <line x1="94"  y1="114" x2="129" y2="149"/>
      <line x1="271" y1="291" x2="306" y2="326"/>
      <line x1="306" y1="114" x2="271" y2="149"/>
      <line x1="129" y1="291" x2="94"  y2="326"/>
    </g>
    <circle cx="200" cy="220" r="78" fill="url(#sun)"/>
    <g fill="url(#cloud)">
      <ellipse cx="320" cy="360" rx="118" ry="42"/>
      <circle cx="240" cy="332" r="52"/>
      <circle cx="296" cy="306" r="62"/>
      <circle cx="360" cy="318" r="52"/>
      <circle cx="404" cy="344" r="38"/>
    </g>
  </g>

  <!-- Wordmark below the logo -->
  <text x="500" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
        font-size="64" font-weight="600"
        fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    WeatherDaddy
  </text>
  <text x="500" y="745"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
        font-size="22" font-weight="500"
        fill="#a0a0a0" text-anchor="middle" letter-spacing="3">
    AT A GLANCE
  </text>
</svg>
