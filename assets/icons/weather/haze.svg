<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>
    <g filter="url(#softShadow)">
        <circle cx="50" cy="45" r="18" fill="#ff5511" opacity="0.75" filter="url(#blurGlow)" />
        <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round" opacity="0.9">
            <line x1="20" y1="52" x2="80" y2="52" />
            <line x1="15" y1="62" x2="85" y2="62" />
            <line x1="25" y1="72" x2="75" y2="72" />
        </g>
    </g>
</svg>
