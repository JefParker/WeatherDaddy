<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <filter id="moonGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feFlood flood-color="#ff5511" flood-opacity="0.4" result="glowColor"/>
            <feComposite in="glowColor" in2="blur" operator="in" result="softGlow"/>
            <feComposite in="SourceGraphic" in2="softGlow" operator="over" />
        </filter>
        <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>
    <g filter="url(#softShadow)">
        <path d="M 38,20 C 56,20 62,35 62,35 C 62,35 53,38 53,51 C 53,64 63,68 63,68 C 63,68 53,78 38,78 C 21,78 12,65 12,49 C 12,33 21,20 38,20 Z" fill="#ffffff" filter="url(#moonGlow)" />
        
        <g fill="#ff5511">
            <path d="M 72,22 L 74,26 L 78,27 L 75,30 L 76,34 L 72,32 L 68,34 L 69,30 L 66,27 L 70,26 Z" />
            <path d="M 84,38 L 85,41 L 88,42 L 86,44 L 87,47 L 84,45 L 81,47 L 82,44 L 80,42 L 83,41 Z" transform="scale(0.8) translate(15, 2)" />
            <path d="M 78,54 L 79,57 L 82,58 L 80,60 L 81,63 L 78,61 L 75,63 L 76,60 L 74,58 L 77,57 Z" transform="scale(0.6) translate(40, 20)" opacity="0.7" />
        </g>
    </g>
</svg>
