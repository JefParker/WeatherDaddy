<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="darkCloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#cbd5e1" />
            <stop offset="100%" stop-color="#64748b" />
        </linearGradient>
        <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>
    <g filter="url(#softShadow)">
        <path d="M 32,55 C 22,55 14,47 14,37 C 14,28 21,20 30,19 C 33,11 41,5 50,5 C 60,5 68,12 70,21 C 72,20 74,20 76,20 C 85,20 92,27 92,36 C 92,45 85,55 76,55 Z" fill="url(#darkCloudGrad)" transform="translate(0, 10)"/>
        <g stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.7">
            <line x1="30" y1="65" x2="26" y2="75" />
            <line x1="42" y1="65" x2="38" y2="75" />
            <line x1="66" y1="65" x2="62" y2="75" />
        </g>
        <path d="M 52,58 L 42,72 L 50,72 L 46,88 L 60,70 L 51,70 Z" fill="#ff5511" filter="url(#blurGlow)" />
        <path d="M 52,58 L 42,72 L 50,72 L 46,88 L 60,70 L 51,70 Z" fill="#ff5511" />
