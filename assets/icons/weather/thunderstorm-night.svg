        <path d="M 54,62 L 45,75 L 52,75 L 48,89 L 61,73 L 53,73 Z" fill="#ff5511" filter="url(#blurGlow)" transform="scale(0.95)"/>
        <path d="M 54,62 L 45,75 L 52,75 L 48,89 L 61,73 L 53,73 Z" fill="#ff5511" transform="scale(0.95)"/>
