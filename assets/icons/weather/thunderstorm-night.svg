            <stop offset="0%" stop-color="#ff8833" />
            <stop offset="100%" stop-color="#ff4400" />
        </linearGradient>
        <linearGradient id="darkCloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#cbd5e1" />
